<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moje výpočty | SVJ Energie</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--navy:#1E3A5F;--blue:#1B6CA8;--blue-l:#E3F0FA;--green:#2E8B4A;--green-l:#E3F4E9;--amber:#F59E0B;--amber-l:#FEF3C7;--text:#1E293B;--text-2:#64748B;--border:#E2E8F0;--bg:#F8FAFB;--white:#fff;--r:12px;--rm:8px;--shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:var(--navy);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.hdr-logo-t{color:#fff;font-size:15px;font-weight:600}
.hdr-links{display:flex;align-items:center;gap:12px}
.hdr-link{color:#8BA8C4;font-size:13px;text-decoration:none;transition:color .15s}
.hdr-link:hover{color:#fff}
.btn-logout{background:transparent;border:1.5px solid rgba(255,255,255,0.25);color:#fff;border-radius:var(--rm);padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.page{max-width:800px;margin:0 auto;padding:32px 16px}
.page-title{font-family:'DM Serif Display',serif;font-size:24px;color:var(--navy);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--text-2);margin-bottom:24px}
.limit-box{background:var(--amber-l);border:1px solid #F6D860;border-radius:var(--r);padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.limit-box.ok{background:var(--green-l);border-color:#A3D8B8}
.sim-grid{display:grid;gap:14px}
.sim-card{background:var(--white);border-radius:var(--r);border:0.5px solid var(--border);box-shadow:var(--shadow);padding:20px;position:relative;transition:box-shadow .2s}
.sim-card:hover{box-shadow:0 4px 20px rgba(30,58,95,0.1)}
.sim-date{font-size:11px;color:var(--text-2);margin-bottom:8px}
.sim-name{font-size:16px;font-weight:600;color:var(--navy);margin-bottom:12px}
.sim-kpis{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.sim-kpi{background:var(--bg);border-radius:var(--rm);padding:8px 12px;min-width:100px}
.sim-kpi-l{font-size:10px;color:var(--text-2);margin-bottom:2px}
.sim-kpi-v{font-size:16px;font-weight:600;color:var(--navy)}
.sim-kpi-u{font-size:10px;color:var(--text-2)}
.sim-kpi.green .sim-kpi-v{color:var(--green)}
.sim-actions{display:flex;gap:8px}
.btn-sim{padding:8px 16px;border-radius:var(--rm);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;border:none;transition:all .15s}
.btn-open{background:var(--blue);color:#fff}
.btn-open:hover{opacity:.9}
.btn-del{background:var(--bg);border:0.5px solid var(--border);color:var(--text-2)}
.btn-del:hover{background:#FEE2E2;border-color:#FCA5A5;color:#991B1B}
.empty{text-align:center;padding:60px 20px;color:var(--text-2)}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-title{font-size:18px;font-weight:600;color:var(--navy);margin-bottom:8px}
.btn-new{display:inline-block;margin-top:16px;padding:12px 24px;background:var(--blue);color:#fff;border-radius:var(--rm);text-decoration:none;font-size:13px;font-weight:600}
.loading-page{text-align:center;padding:80px 20px;color:var(--text-2)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.sim-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.tag{background:var(--blue-l);color:#0C4A7C;border-radius:20px;padding:2px 10px;font-size:11px}
@media(max-width:560px){.sim-kpis{gap:8px}.sim-kpi{min-width:80px}}
</style>
</head>
<body>

<header class="hdr">
  <a href="https://www.svjenergie.cz" class="hdr-logo">
    <div style="background:#1E3A5F;border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.15)">
      <svg width="28" height="28" viewBox="0 0 44 44" fill="none">
        <circle cx="33" cy="11" r="5" fill="#F59E0B"/>
        <rect x="4" y="22" width="11" height="18" rx="1.5" fill="none" stroke="white" stroke-width="1.8"/>
        <rect x="17" y="16" width="13" height="24" rx="1.5" fill="none" stroke="white" stroke-width="1.8"/>
        <rect x="32" y="19" width="9" height="21" rx="1.5" fill="none" stroke="white" stroke-width="1.8"/>
        <polyline points="5,33 14,40 36,18" fill="none" stroke="#2E8B4A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="hdr-logo-t">svjenergie</span>
  </a>
  <div class="hdr-links">
    <a href="kalkulator.html" class="hdr-link">Kalkulačka</a>
    <a href="profil.html" class="hdr-link">Nastavení</a>
    <button class="btn-logout" onclick="odhlasit()">Odhlásit</button>
  </div>
</header>

<div class="page">
  <h1 class="page-title">Moje výpočty</h1>
  <p class="page-sub">Vaše uložené analýzy FVE — max. 5 výpočtů v bezplatném plánu</p>
  <div id="limitBox"></div>
  <div id="simList"><div class="loading-page"><div class="spinner"></div>Načítám výpočty&hellip;</div></div>
</div>

<script>
var SUPA_URL='https://aeypeepckmbejdcotdss.supabase.co';
var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFleXBlZXBja21iZWpkY290ZHNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczOTkyNjAsImV4cCI6MjA5Mjk3NTI2MH0.JjYiI3bcL1ds1vAkFq59Z0WhNCLAd8oekX6GF4Zq5bA';
var TOKEN=localStorage.getItem('supa_access_token');
var MAX_FREE=5;

if(!TOKEN){window.location.href='kalkulator.html';}

function fmtDate(d){
  if(!d) return '—';
  var dt=new Date(d);
  return dt.toLocaleDateString('cs-CZ',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

function fmtKc(v){
  if(!v) return '—';
  return Math.round(v).toLocaleString('cs-CZ')+' Kč';
}

async function init(){
  try{
    // Ověřit přihlášení
    var ru=await fetch(SUPA_URL+'/auth/v1/user',{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+TOKEN}});
    if(!ru.ok) throw new Error('Nepřihlášen');
    var user=await ru.json();

    // Načíst simulace
    var rs=await fetch(SUPA_URL+'/rest/v1/simulations?user_id=eq.'+user.id+'&order=created_at.desc&limit=10',{
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'}
    });
    var sims=await rs.json();
    if(!Array.isArray(sims)) sims=[];
    renderSims(sims);
  }catch(e){
    window.location.href='kalkulator.html';
  }
}

function renderSims(sims){
  SIMS = sims; // uložit globálně pro PDF
  var count=sims.length;
  var limitEl=document.getElementById('limitBox');
  if(count>=MAX_FREE){
    limitEl.innerHTML='<div class="limit-box"><span style="font-size:20px">⚠️</span><div><strong>Dosáhli jste limitu 5 výpočtů.</strong><br><span style="font-size:12px">Příští výpočet bude možný za 12 hodin od nejstaršího, nebo přejděte na placený plán.</span></div></div>';
  } else {
    limitEl.innerHTML='<div class="limit-box ok"><span style="font-size:20px">✅</span><div><strong>'+count+' z '+MAX_FREE+' výpočtů použito</strong><br><span style="font-size:12px">Zbývá '+(MAX_FREE-count)+' výpočtů zdarma.</span></div></div>';
  }

  if(!sims.length){
    document.getElementById('simList').innerHTML=
      '<div class="empty">'+
        '<div class="empty-icon">📊</div>'+
        '<div class="empty-title">Zatím žádné výpočty</div>'+
        '<p>Spusťte PRO kalkulačku a váš výpočet se automaticky uloží.</p>'+
        '<a href="kalkulator-pro.html" class="btn-new">Spustit PRO kalkulačku →</a>'+
      '</div>';
    return;
  }

  var html=sims.map(function(s){
    var params={};
    var result={};
    try{params=JSON.parse(s.params||'{}');}catch(e){}
    try{result=JSON.parse(s.result||'{}');}catch(e){}

    // Tagy
    var tags=[];
    if(params.pocet_bytu||params.bytu) tags.push((params.pocet_bytu||params.bytu)+' bytů');
    if(params.dist) tags.push(params.dist);
    if(params.sazba) tags.push(params.sazba);
    if(params.model) tags.push(params.model==='edc'?'EDC sdílení':params.model==='jom'?'JOM':params.model);
    if(params.bat>0) tags.push('baterie '+params.bat+' kWh');
    if(params.tc) tags.push('TČ');
    if(params.ev>0) tags.push(params.ev+'× EV');

    // Úspora na byt
    var bytu = params.pocet_bytu||params.bytu||1;
    var uspora_byt_mes = result.uspora_rok ? Math.round(result.uspora_rok/bytu/12) : 0;
    var kum25 = result.kum25 || 0;

    return '<div class="sim-card">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">'+
        '<div class="sim-date">'+fmtDate(s.created_at)+'</div>'+
        (result.nav?'<span style="background:var(--green-l);color:#1A5C32;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600">návratnost '+result.nav+' let</span>':'')+
      '</div>'+
      '<div class="sim-name">'+s.name+'</div>'+
      (tags.length?'<div class="sim-tags">'+tags.map(function(t){return '<span class="tag">'+t+'</span>';}).join('')+'</div>':'')+
      '<div class="sim-kpis">'+
        '<div class="sim-kpi"><div class="sim-kpi-l">Výkon FVE</div><div class="sim-kpi-v">'+(params.kwp||'—')+'</div><div class="sim-kpi-u">kWp</div></div>'+
        '<div class="sim-kpi green"><div class="sim-kpi-l">Roční úspora</div><div class="sim-kpi-v">'+(result.uspora_rok?fmtKc(result.uspora_rok):'—')+'</div><div class="sim-kpi-u">/rok</div></div>'+
        '<div class="sim-kpi green"><div class="sim-kpi-l">Úspora/byt/měs</div><div class="sim-kpi-v">'+(uspora_byt_mes?uspora_byt_mes+' Kč':'—')+'</div><div class="sim-kpi-u">/měsíc</div></div>'+
        '<div class="sim-kpi"><div class="sim-kpi-l">Investice</div><div class="sim-kpi-v">'+(result.investice?Math.round(result.investice/1000)+'k':'—')+'</div><div class="sim-kpi-u">Kč</div></div>'+
        '<div class="sim-kpi"><div class="sim-kpi-l">Výroba</div><div class="sim-kpi-v">'+(result.vyroba_mwh||'—')+'</div><div class="sim-kpi-u">MWh/rok</div></div>'+
        '<div class="sim-kpi"><div class="sim-kpi-l">Kumulativ 25 let</div><div class="sim-kpi-v">'+(kum25?Math.round(kum25/1000)+'k':'—')+'</div><div class="sim-kpi-u">Kč</div></div>'+
      '</div>'+
      // Přesvědčivý text
      (result.uspora_rok && bytu>1?
        '<div style="background:var(--green-l);border-radius:8px;padding:10px 14px;font-size:12px;color:#1A5C32;margin-bottom:10px;border-left:3px solid var(--green)">'+
        '💡 Každý byt ušetří <strong>'+uspora_byt_mes+' Kč/měsíc</strong>'+
        (kum25?' a za 25 let dům vydělá celkem <strong>'+Math.round(kum25).toLocaleString('cs-CZ')+' Kč</strong>':'')+
        '</div>':'')+ 
      '<div class="sim-actions">'+
        '<button class="btn-sim btn-open" onclick="otevritVypocet(\''+s.id+'\')">📊 Zobrazit výsledky →</button>'+
        '<button class="btn-sim btn-pdf" onclick="exportSimPdf(\''+s.id+'\')" style="background:var(--navy);color:#fff;border:none;border-radius:var(--rm);padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">📄 PDF</button>'+
        '<button class="btn-sim btn-del" onclick="smazatVypocet(\''+s.id+'\')">Smazat</button>'+
      '</div>'+
    '</div>';
  }).join('');

  html+='<div style="text-align:center;margin-top:20px"><a href="kalkulator-pro.html" class="btn-new">+ Nový výpočet</a></div>';
  document.getElementById('simList').innerHTML='<div class="sim-grid">'+html+'</div>';
}

var SIMS = []; // globální pro PDF export

function otevritVypocet(id){
  sessionStorage.setItem('load_sim_id', id);
  window.location.href='kalkulator-pro.html';
}

function exportSimPdf(id){
  const s = SIMS.find(x=>x.id===id);
  if(!s){ alert('Simulace nenalezena'); return; }
  let params={}, result={};
  try{params=JSON.parse(s.params||'{}');}catch(e){}
  try{result=JSON.parse(s.result||'{}');}catch(e){}
  otevritPdfReport(s.name||'Výpočet', params, result);
}

function otevritPdfReport(nazev, params, result){
  const bytu = params.pocet_bytu||params.bytu||1;
  const inv = result.investice||0;
  const uver = Math.min(inv*0.8, 5000000);
  const splatnost = params.splatnost||15;
  const uspora_byt_mes = result.uspora_rok ? Math.round(result.uspora_rok/bytu/12) : 0;
  const nzu_spl_byt = Math.round(uver/splatnost/bytu/12);
  const nav = result.nav;
  const kum25 = result.kum25||0;
  const kc = v => Math.round(v).toLocaleString('cs-CZ')+' Kč';

  const verdiktTxt = nav ?
    (nav<=10?`✅ Vynikající investice — návratnost ${nav} let`:
     nav<=15?`✅ Dobrá investice — návratnost ${nav} let`:
     nav<=20?`⚠️ Přijatelná investice — návratnost ${nav} let`:
     `⚠️ Hraniční projekt — návratnost ${nav} let`) :
    '❌ Projekt se za 25 let nevrátí';
  const verdiktBg = nav&&nav<=15?'#E3F4E9':nav&&nav<=20?'#FEF3C7':'#FEE2E2';
  const verdiktColor = nav&&nav<=15?'#1A5C32':nav&&nav<=20?'#7C5300':'#991B1B';

  const html = `<!DOCTYPE html>
<html lang="cs"><head><meta charset="UTF-8">
<title>SVJ Energie — ${nazev}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',Arial,sans-serif;font-size:13px;color:#1E293B;background:#fff;line-height:1.5}
.page{max-width:210mm;margin:0 auto;padding:12mm 14mm}
h2{font-size:13px;font-weight:600;color:#1E3A5F;margin:16px 0 8px;padding-bottom:4px;border-bottom:2px solid #E2E8F0}
.hdr{background:#1E3A5F;color:#fff;padding:14px 18px;border-radius:8px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.hdr-t{font-size:17px;font-weight:700}.hdr-s{font-size:10px;color:#8BA8C4;margin-top:2px}
.green-line{height:3px;background:#2E8B4A;border-radius:2px;margin-bottom:12px}
.verdikt{padding:10px 14px;border-radius:8px;margin-bottom:12px}
.kpi-row{display:flex;gap:8px;margin-bottom:14px}
.kpi{flex:1;padding:10px 12px;border-radius:8px;border:1px solid #E2E8F0}
.kpi-l{font-size:10px;color:#64748B;margin-bottom:2px}.kpi-v{font-size:18px;font-weight:700;line-height:1}.kpi-u{font-size:10px;color:#64748B;margin-top:2px}
.kpi.green{background:#E3F4E9}.kpi.green .kpi-v{color:#1A5C32}.kpi.green .kpi-l,.kpi.green .kpi-u{color:#2E6B40}
.kpi.blue{background:#E3F0FA}.kpi.blue .kpi-v{color:#1E3A5F}
.kpi.amber{background:#FEF3C7}.kpi.amber .kpi-v{color:#78350F}.kpi.amber .kpi-l,.kpi.amber .kpi-u{color:#92400E}
table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px}
th{background:#1E3A5F;color:#fff;padding:7px 10px;text-align:left;font-size:11px;font-weight:600}
td{padding:6px 10px;border-bottom:0.5px solid #E2E8F0}
.nzu{background:#E3F4E9;border:1px solid #A3D8B8;border-radius:8px;padding:12px 14px;margin-bottom:12px}
.nzu-t{font-weight:600;color:#1A5C32;margin-bottom:6px}
.nzu-r{color:#2E6B40;margin-bottom:3px;font-size:12px}
.footer-box{background:#1E3A5F;color:#fff;padding:12px 16px;border-radius:8px;margin-top:14px}
.print-btn{position:fixed;bottom:20px;right:20px;background:#2E8B4A;color:#fff;border:none;border-radius:10px;padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(46,139,74,.4);font-family:inherit;z-index:999}
@media print{.print-btn{display:none!important}.page{padding:8mm 10mm}
.hdr,.nzu,.footer-box,.kpi.green,.kpi.blue,.kpi.amber,.verdikt,th,tr{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
@page{size:A4;margin:10mm 12mm}
</style></head><body>
<button class="print-btn" onclick="window.print()">🖨️ Uložit jako PDF</button>
<div class="page">
  <div class="hdr">
    <div><div class="hdr-t">SVJ Energie — Analýza FVE</div><div class="hdr-s">www.svjenergie.cz · Orientační výpočet</div></div>
    <div style="font-size:11px;color:#8BA8C4;text-align:right">${new Date().toLocaleDateString('cs-CZ',{day:'2-digit',month:'long',year:'numeric'})}</div>
  </div>
  <div class="green-line"></div>

  <h1 style="font-family:'DM Serif Display',Georgia,serif;font-size:20px;color:#1E3A5F;margin-bottom:4px">${params.lokace||nazev}</h1>
  <p style="color:#64748B;margin-bottom:12px;font-size:12px">${bytu} bytů · ${params.kwp||'—'} kWp · ${params.dist||'—'} · ${params.sazba||'—'} · ${params.model||'edc'}</p>

  <div class="verdikt" style="background:${verdiktBg};border:1px solid ${verdiktColor}40">
    <strong style="color:${verdiktColor};font-size:13px">${verdiktTxt}</strong><br>
    <span style="color:${verdiktColor};font-size:11px">Za 25 let dům ušetří <strong>${kc(kum25)}</strong> — to je <strong>${kc(kum25/bytu)}</strong> na byt. Každý byt ušetří <strong>${uspora_byt_mes.toLocaleString('cs-CZ')} Kč/měsíc</strong> od prvního roku.</span>
  </div>

  <div class="kpi-row">
    <div class="kpi green"><div class="kpi-l">Roční úspora</div><div class="kpi-v">${result.uspora_rok?kc(result.uspora_rok):'—'}</div><div class="kpi-u">${uspora_byt_mes} Kč/byt/měs</div></div>
    <div class="kpi blue"><div class="kpi-l">Výkon FVE · Výroba</div><div class="kpi-v">${params.kwp||'—'} kWp</div><div class="kpi-u">${result.vyroba_mwh||'—'} MWh/rok</div></div>
    <div class="kpi amber"><div class="kpi-l">Investice · Splátka NZÚ</div><div class="kpi-v">${inv?Math.round(inv/1000).toLocaleString('cs-CZ')+' tis.':'—'}</div><div class="kpi-u">${nzu_spl_byt} Kč/byt/měs</div></div>
  </div>

  <h2>Parametry výpočtu</h2>
  <table>
    <tr><th>Parametr</th><th style="text-align:right">Hodnota</th></tr>
    <tr><td>Adresa</td><td style="text-align:right">${params.lokace||'—'}</td></tr>
    <tr style="background:#F8FAFB"><td>Bytů / pater</td><td style="text-align:right">${bytu} / ${params.pater||'—'}</td></tr>
    <tr><td>Distributor / sazba</td><td style="text-align:right">${params.dist||'—'} / ${params.sazba||'—'}</td></tr>
    <tr style="background:#F8FAFB"><td>Výkon FVE / baterie</td><td style="text-align:right">${params.kwp||'—'} kWp / ${params.bat||0} kWh</td></tr>
    <tr><td>Model sdílení</td><td style="text-align:right">${params.model==='edc'?'EDC — komunitní sdílení':params.model==='jom'?'JOM':'Jen spol. prostory'}</td></tr>
