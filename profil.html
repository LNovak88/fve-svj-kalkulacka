<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nastavení účtu | SVJ Energie</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--navy:#1E3A5F;--blue:#1B6CA8;--blue-l:#E3F0FA;--green:#2E8B4A;--green-l:#E3F4E9;--text:#1E293B;--text-2:#64748B;--border:#E2E8F0;--bg:#F8FAFB;--white:#fff;--r:12px;--rm:8px;--shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:var(--navy);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.hdr-logo-t{color:#fff;font-size:15px;font-weight:600}
.hdr-links{display:flex;align-items:center;gap:12px}
.hdr-link{color:#8BA8C4;font-size:13px;text-decoration:none;transition:color .15s}
.hdr-link:hover{color:#fff}
.btn-logout{background:transparent;border:1.5px solid rgba(255,255,255,0.25);color:#fff;border-radius:var(--rm);padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.page{max-width:640px;margin:0 auto;padding:32px 16px}
.page-title{font-family:'DM Serif Display',serif;font-size:24px;color:var(--navy);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--text-2);margin-bottom:24px}
.card{background:var(--white);border-radius:var(--r);border:0.5px solid var(--border);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.card-hdr{padding:16px 20px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px}
.card-title{font-size:14px;font-weight:600;color:var(--navy)}
.card-body{padding:20px}
.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
label{display:block;font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:4px;letter-spacing:.4px}
input,select{width:100%;padding:10px 13px;border:0.5px solid #CBD5E1;border-radius:var(--rm);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;background:var(--white);color:var(--text)}
input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-l)}
input:disabled{background:var(--bg);color:var(--text-2);cursor:not-allowed}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-save{padding:11px 24px;background:var(--blue);color:#fff;border:none;border-radius:var(--rm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-save:hover{opacity:.9}
.btn-save:disabled{opacity:.6;cursor:not-allowed}
.btn-danger{padding:11px 24px;background:#FEE2E2;color:#991B1B;border:1px solid #FCA5A5;border-radius:var(--rm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-danger:hover{background:#991B1B;color:#fff}
.alert{padding:10px 14px;border-radius:var(--rm);font-size:13px;margin-bottom:14px;display:none}
.alert.ok{background:var(--green-l);border:1px solid #A3D8B8;color:#1A5C32}
.alert.err{background:#FEE2E2;border:1px solid #FCA5A5;color:#991B1B}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:42px}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-2)}
.pw-strength{height:3px;border-radius:2px;margin-top:4px;background:var(--border);transition:all .3s;width:0}
.pw-hint{font-size:10px;color:var(--text-2);margin-top:2px}
.plan-box{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--blue-l);border-radius:var(--rm);border:1px solid #C8DFF2}
.plan-name{font-size:14px;font-weight:600;color:var(--navy)}
.plan-desc{font-size:12px;color:#4A7BA8;margin-top:2px}
.badge-plan{background:var(--green-l);color:var(--green);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:600}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-page{text-align:center;padding:80px 20px;color:var(--text-2)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@media(max-width:560px){.g2{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="hdr">
  <a href="https://www.svjenergie.cz" class="hdr-logo">
    <div style="background:#1E3A5F;border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.15)">
      <svg width="28" height="28" viewBox="0 0 44 44" fill="none">
        <circle cx="33" cy="11" r="5" fill="#F59E0B"/>
        <rect x="4" y="22" width="11" height="18" rx="1.5" fill="none" stroke="white" stroke-width="1.8"/>
        <rect x="17" y="16" width="13" height="24" rx="1.5" fill="none" stroke="white" stroke-width="1.8"/>
        <rect x="32" y="19" width="9" height="21" rx="1.5" fill="none" stroke="white" stroke-width="1.8"/>
        <polyline points="5,33 14,40 36,18" fill="none" stroke="#2E8B4A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="hdr-logo-t">svjenergie</span>
  </a>
  <div class="hdr-links">
    <a href="kalkulator.html" class="hdr-link">Kalkulačka</a>
    <a href="moje-vypocty.html" class="hdr-link">Moje výpočty</a>
    <button class="btn-logout" onclick="odhlasit()">Odhlásit</button>
  </div>
</header>

<div class="page" id="pageContent">
  <div class="loading-page">
    <div class="spinner"></div>
    Načítám profil&hellip;
  </div>
</div>

<script>
var SUPA_URL='https://aeypeepckmbejdcotdss.supabase.co';
var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFleXBlZXBja21iZWpkY290ZHNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczOTkyNjAsImV4cCI6MjA5Mjk3NTI2MH0.JjYiI3bcL1ds1vAkFq59Z0WhNCLAd8oekX6GF4Zq5bA';
var TOKEN=localStorage.getItem('supa_access_token');
var USER=null;

if(!TOKEN){window.location.href='kalkulator.html';}

async function init(){
  try{
    var r=await fetch(SUPA_URL+'/auth/v1/user',{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+TOKEN}});
    if(!r.ok) throw new Error('Neplatné přihlášení');
    USER=await r.json();
    renderPage();
  }catch(e){
    window.location.href='kalkulator.html';
  }
}

function renderPage(){
  var meta=USER.user_metadata||{};
  var jmeno=(meta.full_name||'').split(' ')[0]||'';
  var prijmeni=(meta.full_name||'').split(' ').slice(1).join(' ')||'';
  document.getElementById('pageContent').innerHTML=
    '<h1 class="page-title">Nastavení účtu</h1>'+
    '<p class="page-sub">Spravujte své osobní údaje a přihlašovací informace</p>'+

    // Plán
    '<div class="card">'+
      '<div class="card-hdr"><span style="font-size:18px">⭐</span><span class="card-title">Váš plán</span></div>'+
      '<div class="card-body">'+
        '<div class="plan-box">'+
          '<div><div class="plan-name">Bezplatný plán</div><div class="plan-desc">5 výpočtů · neomezený přístup k výsledkům</div></div>'+
          '<span class="badge-plan">Aktivní</span>'+
        '</div>'+
      '</div>'+
    '</div>'+

    // Osobní údaje
    '<div class="card">'+
      '<div class="card-hdr"><span style="font-size:18px">👤</span><span class="card-title">Osobní údaje</span></div>'+
      '<div class="card-body">'+
        '<div id="alertProfil" class="alert"></div>'+
        '<div class="g2">'+
          '<div class="field"><label>JMÉNO</label><input type="text" id="pJmeno" value="'+jmeno+'" placeholder="Jan"></div>'+
          '<div class="field"><label>PŘÍJMENÍ</label><input type="text" id="pPrijmeni" value="'+prijmeni+'" placeholder="Novák"></div>'+
        '</div>'+
        '<div class="field"><label>E-MAILOVÁ ADRESA</label><input type="email" id="pEmail" value="'+(USER.email||'')+'" disabled></div>'+
        '<div class="field"><label>TELEFON</label><input type="tel" id="pTel" value="'+(meta.phone||'')+'" placeholder="603 123 456"></div>'+
        '<div class="field"><label>NÁZEV SVJ</label><input type="text" id="pSvj" value="'+(meta.svj||'')+'" placeholder="SVJ Ke Školce 12"></div>'+
        '<div class="field"><label>POZICE V SVJ</label>'+
          '<select id="pPozice">'+
            '<option value="">Vyberte pozici…</option>'+
            ['predseda:Předseda SVJ','clen_vyboru:Člen výboru SVJ','spravce:Profesionální správce','vlastnik:Vlastník bytu','jine:Jiné'].map(function(o){
              var parts=o.split(':');
              return '<option value="'+parts[0]+'"'+(meta.pozice===parts[0]?' selected':'')+'>'+parts[1]+'</option>';
            }).join('')+
          '</select>'+
        '</div>'+
        '<button class="btn-save" id="btnSaveProfil" onclick="saveProfil()">Uložit změny</button>'+
      '</div>'+
    '</div>'+

    // Změna hesla
    '<div class="card">'+
      '<div class="card-hdr"><span style="font-size:18px">🔒</span><span class="card-title">Změna hesla</span></div>'+
      '<div class="card-body">'+
        '<div id="alertHeslo" class="alert"></div>'+
        '<div class="field"><label>NOVÉ HESLO</label>'+
          '<div class="pw-wrap"><input type="password" id="pHeslo" placeholder="Minimálně 8 znaků" oninput="checkPw(this.value)">'+
          '<button class="pw-eye" onclick="togPw(\'pHeslo\',this)" type="button">&#128065;</button>'+
          '<div class="pw-strength" id="pwStr"></div><div class="pw-hint" id="pwHint"></div></div>'+
        '</div>'+
        '<div class="field"><label>POTVRDIT NOVÉ HESLO</label>'+
          '<div class="pw-wrap"><input type="password" id="pHeslo2" placeholder="Zopakujte heslo">'+
          '<button class="pw-eye" onclick="togPw(\'pHeslo2\',this)" type="button">&#128065;</button></div>'+
        '</div>'+
        '<button class="btn-save" id="btnSaveHeslo" onclick="saveHeslo()">Změnit heslo</button>'+
      '</div>'+
    '</div>'+

    // Nebezpečná zóna
    '<div class="card">'+
      '<div class="card-hdr"><span style="font-size:18px">⚠️</span><span class="card-title">Zrušení účtu</span></div>'+
      '<div class="card-body">'+
        '<p style="font-size:13px;color:var(--text-2);margin-bottom:14px">Zrušením účtu přijdete o všechny uložené výpočty. Tato akce je nevratná.</p>'+
        '<button class="btn-danger" onclick="zrusitUcet()">Zrušit účet</button>'+
      '</div>'+
    '</div>';
}

async function saveProfil(){
  var jmeno=document.getElementById('pJmeno').value.trim();
  var prijmeni=document.getElementById('pPrijmeni').value.trim();
  var tel=document.getElementById('pTel').value.trim();
  var svj=document.getElementById('pSvj').value.trim();
  var pozice=document.getElementById('pPozice').value;
  var btn=document.getElementById('btnSaveProfil');
  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span> Ukládám&hellip;';
  try{
    var r=await fetch(SUPA_URL+'/auth/v1/user',{
      method:'PUT',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},
      body:JSON.stringify({data:{full_name:(jmeno+' '+prijmeni).trim(),phone:tel,svj:svj,pozice:pozice}})
    });
    if(!r.ok) throw new Error('Chyba uložení');
    showAlert('alertProfil','ok','✅ Údaje byly úspěšně uloženy.');
  }catch(e){
    showAlert('alertProfil','err','❌ '+e.message);
  }
  btn.disabled=false;
  btn.textContent='Uložit změny';
}

async function saveHeslo(){
  var pw1=document.getElementById('pHeslo').value;
  var pw2=document.getElementById('pHeslo2').value;
  if(!pw1||pw1.length<8){showAlert('alertHeslo','err','Heslo musí mít alespoň 8 znaků.');return;}
  if(pw1!==pw2){showAlert('alertHeslo','err','Hesla se neshodují.');return;}
  var btn=document.getElementById('btnSaveHeslo');
  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span> Ukládám&hellip;';
  try{
    var r=await fetch(SUPA_URL+'/auth/v1/user',{
      method:'PUT',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},
      body:JSON.stringify({password:pw1})
    });
    if(!r.ok) throw new Error('Chyba změny hesla');
    document.getElementById('pHeslo').value='';
    document.getElementById('pHeslo2').value='';
    showAlert('alertHeslo','ok','✅ Heslo bylo úspěšně změněno.');
  }catch(e){
    showAlert('alertHeslo','err','❌ '+e.message);
  }
  btn.disabled=false;
  btn.textContent='Změnit heslo';
}

function zrusitUcet(){
  if(!confirm('Opravdu chcete zrušit účet? Tato akce je nevratná.')) return;
  alert('Pro zrušení účtu nás kontaktujte na gdpr@svjenergie.cz');
}

function showAlert(id,type,msg){
  var el=document.getElementById(id);
  if(!el) return;
  el.className='alert '+type;
  el.innerHTML=msg;
  el.style.display='block';
  setTimeout(function(){el.style.display='none';},4000);
}

function checkPw(pw){
  var s=document.getElementById('pwStr');
  var h=document.getElementById('pwHint');
  var strong=pw.length>=10&&/[A-Z]/.test(pw)&&/[0-9]/.test(pw);
  var ok=pw.length>=8;
  s.style.background=strong?'#2E8B4A':ok?'#F59E0B':pw.length?'#F43F5E':'#E2E8F0';
  s.style.width=strong?'100%':ok?'66%':pw.length?'33%':'0';
  h.textContent=strong?'Silné heslo':ok?'Přidejte číslo nebo velké písmeno':'Minimálně 8 znaků';
}

function togPw(id,btn){
  var el=document.getElementById(id);
  el.type=el.type==='password'?'text':'password';
  btn.textContent=el.type==='password'?'\uD83D\uDC41':'🔒';
}

function odhlasit(){
  localStorage.removeItem('supa_access_token');
  sessionStorage.removeItem('premium_unlocked');
  window.location.href='https://www.svjenergie.cz';
}

init();
</script>
</body>
</html>
