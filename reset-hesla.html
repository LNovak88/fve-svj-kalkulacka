<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nastavit nové heslo | SVJ Energie</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--navy:#1E3A5F;--blue:#1B6CA8;--blue-l:#E3F0FA;--green:#2E8B4A;--green-l:#E3F4E9;--text:#1E293B;--text-2:#64748B;--border:#E2E8F0;--bg:#F8FAFB;--white:#ffffff;--r:14px;--rm:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:var(--white);border-radius:var(--r);padding:36px;max-width:420px;width:100%;box-shadow:0 8px 32px rgba(30,58,95,0.12);border:0.5px solid var(--border)}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:24px;text-decoration:none}
.logo-t{font-size:16px;font-weight:600;color:var(--navy)}
h1{font-family:'DM Serif Display',serif;font-size:22px;color:var(--navy);margin-bottom:6px}
.sub{font-size:13px;color:var(--text-2);margin-bottom:22px;line-height:1.5}
.field{margin-bottom:12px}
label{display:block;font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:4px;letter-spacing:.4px}
input{width:100%;padding:11px 13px;border:0.5px solid #CBD5E1;border-radius:var(--rm);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-l)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:42px}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-2)}
.pw-strength{height:3px;border-radius:2px;margin-top:4px;background:var(--border);transition:all .3s;width:0}
.pw-hint{font-size:10px;color:var(--text-2);margin-top:2px}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--blue) 0%,#1557a0 100%);color:#fff;border:none;border-radius:var(--rm);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s}
.btn:hover{opacity:.9}
.alert{padding:12px 14px;border-radius:var(--rm);font-size:13px;margin-bottom:14px;display:none;line-height:1.5}
.alert.err{background:#FEE2E2;border:1px solid #FCA5A5;color:#991B1B}
.alert.ok{background:var(--green-l);border:1px solid #A3D8B8;color:#1A5C32}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <a href="https://www.svjenergie.cz" class="logo">
    <div style="background:#1E3A5F;border-radius:8px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <svg width="34" height="34" viewBox="0 0 44 44" fill="none">
        <circle cx="33" cy="11" r="5" fill="#F59E0B"/>
        <line x1="33" y1="4" x2="33" y2="2" stroke="#F59E0B" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="38" y1="6" x2="40" y2="4" stroke="#F59E0B" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="40" y1="11" x2="42" y2="11" stroke="#F59E0B" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="28" y1="6" x2="26" y2="4" stroke="#F59E0B" stroke-width="1.8" stroke-linecap="round"/>
        <rect x="4" y="22" width="11" height="18" rx="1.5" fill="none" stroke="white" stroke-width="1.8"/>
        <rect x="17" y="16" width="13" height="24" rx="1.5" fill="none" stroke="white" stroke-width="1.8"/>
        <rect x="32" y="19" width="9" height="21" rx="1.5" fill="none" stroke="white" stroke-width="1.8"/>
        <line x1="3" y1="40" x2="42" y2="40" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity=".4"/>
        <polyline points="5,33 14,40 36,18" fill="none" stroke="#2E8B4A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="logo-t">svjenergie</span>
  </a>

  <div id="alertBox" class="alert"></div>

  <div id="formWrap">
    <h1>Nastavit nové heslo</h1>
    <p class="sub">Zadejte nové heslo pro váš účet SVJ Energie.</p>
    <div class="field">
      <label>NOVÉ HESLO</label>
      <div class="pw-wrap">
        <input type="password" id="pw1" placeholder="Minimálně 8 znaků" oninput="checkStr(this.value)" autocomplete="new-password">
        <button class="pw-eye" onclick="tog('pw1',this)" type="button">&#128065;</button>
        <div class="pw-strength" id="str"></div>
        <div class="pw-hint" id="strHint"></div>
      </div>
    </div>
    <div class="field">
      <label>POTVRDIT HESLO</label>
      <div class="pw-wrap">
        <input type="password" id="pw2" placeholder="Zopakujte heslo" autocomplete="new-password">
        <button class="pw-eye" onclick="tog('pw2',this)" type="button">&#128065;</button>
      </div>
    </div>
    <button class="btn" id="submitBtn" onclick="submitReset()">
      <span id="btnTxt">Uložit nové heslo &rarr;</span>
    </button>
  </div>

  <div id="successWrap" style="display:none;text-align:center;padding:20px 0">
    <div style="font-size:48px;margin-bottom:12px">&#9989;</div>
    <h1 style="margin-bottom:8px">Heslo změněno!</h1>
    <p class="sub">Přesměrováváme vás na kalkulačku&hellip;</p>
  </div>
</div>
<script>
var SUPA_URL='https://aeypeepckmbejdcotdss.supabase.co';
var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFleXBlZXBja21iZWpkY290ZHNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczOTkyNjAsImV4cCI6MjA5Mjk3NTI2MH0.JjYiI3bcL1ds1vAkFq59Z0WhNCLAd8oekX6GF4Zq5bA';
var SESSION_TOKEN=null;

function showAlert(t,msg){
  var el=document.getElementById('alertBox');
  el.className='alert '+t;
  el.textContent=msg;
  el.style.display='block';
}

function checkStr(pw){
  var s=document.getElementById('str');
  var h=document.getElementById('strHint');
  var strong=pw.length>=10&&/[A-Z]/.test(pw)&&/[0-9]/.test(pw);
  var ok=pw.length>=8;
  s.style.background=strong?'#2E8B4A':ok?'#F59E0B':pw.length?'#F43F5E':'#E2E8F0';
  s.style.width=strong?'100%':ok?'66%':pw.length?'33%':'0';
  h.textContent=strong?'Silné heslo':ok?'Přidejte číslo nebo velké písmeno':'Minimálně 8 znaků';
}

function tog(id,btn){
  var el=document.getElementById(id);
  el.type=el.type==='password'?'text':'password';
  btn.textContent=el.type==='password'?'\uD83D\uDC41':'🔒';
}

function init(){
  var hp=new URLSearchParams(window.location.hash.substring(1));
  var qp=new URLSearchParams(window.location.search);
  function get(k){return hp.get(k)||qp.get(k)||null;}

  var access_token=get('access_token');
  var token_hash=get('token_hash');
  var type=get('type');

  if(access_token && access_token.split('.').length===3){
    SESSION_TOKEN=access_token;
    return;
  }

  if(token_hash){
    fetch(SUPA_URL+'/auth/v1/verify',{
      method:'POST',
      headers:{'apikey':SUPA_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({token_hash:token_hash, type:type||'recovery'})
    }).then(function(r){return r.json();}).then(function(d){
      if(d.access_token){SESSION_TOKEN=d.access_token;}
      else{
        showAlert('err','Odkaz je neplatný nebo expirovaný. Požádejte o nový reset hesla.');
        document.getElementById('formWrap').style.display='none';
      }
    }).catch(function(){
      showAlert('err','Chyba připojení. Zkuste to znovu.');
      document.getElementById('formWrap').style.display='none';
    });
    return;
  }

  showAlert('err','Neplatný odkaz. Požádejte o nový reset hesla.');
  document.getElementById('formWrap').style.display='none';
}

function submitReset(){
  var pw1=document.getElementById('pw1').value;
  var pw2=document.getElementById('pw2').value;
  if(!pw1||pw1.length<8){showAlert('err','Heslo musí mít alespoň 8 znaků.');return;}
  if(pw1!==pw2){showAlert('err','Hesla se neshodují.');return;}
  if(!SESSION_TOKEN){showAlert('err','Relace vypršela. Požádejte o nový odkaz.');return;}

  var btn=document.getElementById('submitBtn');
  var txt=document.getElementById('btnTxt');
  btn.disabled=true;
  txt.innerHTML='<span class="spin"></span> Ukládám&hellip;';

  fetch(SUPA_URL+'/auth/v1/user',{
    method:'PUT',
    headers:{
      'apikey':SUPA_KEY,
      'Content-Type':'application/json',
      'Authorization':'Bearer '+SESSION_TOKEN
    },
    body:JSON.stringify({password:pw1})
  }).then(function(r){
    return r.json().then(function(data){
      if(!r.ok) throw new Error(data.message||data.msg||'Chyba při změně hesla');
      localStorage.setItem('supa_access_token',SESSION_TOKEN);
      document.getElementById('formWrap').style.display='none';
      document.getElementById('successWrap').style.display='block';
      setTimeout(function(){window.location.href='kalkulator.html';},2000);
    });
  }).catch(function(e){
    showAlert('err',e.message);
    btn.disabled=false;
    txt.textContent='Uložit nové heslo \u2192';
  });
}

init();
</script>
</body>
</html>
