<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FVE Kalkulačka PRO — SVJ Energie</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

<style>
/* ── Stejné CSS proměnné jako kalkulator.html ── */
:root{--navy:#1E3A5F;--blue:#1B6CA8;--blue-l:#E3F0FA;--blue-ll:#F0F7FD;--green:#2E8B4A;--green-l:#E3F4E9;--amber:#F59E0B;--amber-l:#FEF3C7;--rose:#F43F5E;--text:#1E293B;--text-2:#64748B;--border:#E2E8F0;--bg:#F8FAFB;--white:#ffffff;--r:12px;--rm:8px;--shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);--shadow-lg:0 8px 32px rgba(30,58,95,0.12)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
.page{max-width:960px;margin:0 auto;padding:1rem 1rem 4rem}

/* ── Hlavička ── */
.hdr{background:var(--navy);border-radius:var(--r);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;box-shadow:var(--shadow-lg)}
.hdr-logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-box{width:40px;height:40px;background:var(--blue);border-radius:var(--rm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-t{color:#fff;font-size:16px;font-weight:600;letter-spacing:-.3px}
.logo-s{color:#8BA8C4;font-size:11px;margin-top:1px}
.pro-badge{background:linear-gradient(135deg,#F59E0B,#D97706);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.5px;margin-left:6px;vertical-align:middle}

/* ── User menu ── */
.user-menu{position:relative}
.user-btn{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.25);color:#fff;border-radius:var(--rm);padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s}
.user-btn:hover{background:rgba(255,255,255,0.2)}
.user-avatar{width:24px;height:24px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.user-dropdown{display:none;position:absolute;top:calc(100% + 8px);right:0;background:var(--white);border:0.5px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-lg);min-width:200px;z-index:200;overflow:hidden}
.user-dropdown.open{display:block}
.user-dd-header{padding:12px 14px;border-bottom:0.5px solid var(--border);background:var(--bg)}
.user-dd-name{font-size:13px;font-weight:600;color:var(--navy)}
.user-dd-email{font-size:11px;color:var(--text-2);margin-top:1px;word-break:break-all}
.user-dd-item{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:13px;color:var(--text);cursor:pointer;transition:background .1s;border:none;background:none;width:100%;text-align:left;font-family:inherit;text-decoration:none}
.user-dd-item:hover{background:var(--blue-ll);color:var(--blue)}
.user-dd-item.danger:hover{background:#FEE2E2;color:#991B1B}
.user-dd-sep{height:0.5px;background:var(--border);margin:4px 0}

/* ── Progress bar + kroky ── */
.prog{height:3px;background:var(--border);border-radius:2px;margin-bottom:16px;overflow:hidden}
.prog-f{height:100%;background:var(--blue);border-radius:2px;transition:width .4s ease}
.hdr-steps{display:flex;align-items:center;gap:4px}
.sd{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;flex-shrink:0}
.sd.done{background:var(--green);color:#fff}.sd.active{background:#fff;color:var(--navy)}.sd.todo{background:transparent;color:#8BA8C4;border:1.5px solid #3A5A7A}
.sl{width:16px;height:1.5px;background:#3A5A7A;flex-shrink:0}.sl.done{background:var(--green)}

/* ── Karty ── */
.card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:12px;box-shadow:var(--shadow);animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ctitle{font-family:'DM Serif Display',serif;font-size:22px;color:var(--navy);margin-bottom:4px;line-height:1.3}
.csub{font-size:13px;color:var(--text-2);margin-bottom:20px}
.slabel{font-size:11px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.6px;margin:16px 0 8px}

/* ── Formulářové prvky ── */
label{display:block;font-size:12px;color:var(--text-2);margin-bottom:4px;font-weight:500}
input[type=text],input[type=number],input[type=email],select{width:100%;padding:10px 13px;border:0.5px solid #CBD5E1;border-radius:var(--rm);font-size:13px;color:var(--text);background:var(--white);font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s;-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-l)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* PRO: Editovatelné pole se zvýrazněním */
.pro-input-wrap{position:relative}
.pro-input-wrap input,.pro-input-wrap select{border-color:#A8C4E0;background:#FAFEFF}
.pro-input-wrap input:focus,.pro-input-wrap select:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-l)}
.pro-edit-ico{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:12px;color:#94BFDE;pointer-events:none}

/* ── Autocomplete ── */
.autocomplete-wrap{position:relative}
.ac-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--white);border:0.5px solid #CBD5E1;border-radius:var(--rm);z-index:100;box-shadow:var(--shadow-lg);overflow:hidden;display:none}
.ac-list.open{display:block}
.ac-item{padding:10px 13px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s;color:var(--text)}
.ac-item:hover{background:var(--blue-l)}

/* ── Toggle tlačítka ── */
.tog-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tog{display:flex;align-items:center;gap:10px;padding:11px 14px;border:0.5px solid var(--border);border-radius:var(--rm);cursor:pointer;transition:all .15s;background:var(--white);user-select:none}
.tog:hover{border-color:#94BFDE;background:var(--blue-ll)}.tog.on{border-color:var(--blue);background:var(--blue-ll)}
.tog-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.tog-body{flex:1;min-width:0}
.tog-name{font-size:13px;font-weight:500;color:var(--text)}
.tog-sub{font-size:11px;color:var(--text-2);margin-top:1px}
.tog-chk{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s}
.tog.on .tog-chk{background:var(--blue);border-color:var(--blue);color:#fff}

/* ── Chip výběr ── */
.chip-grid{display:grid;gap:8px}.chip-grid.c3{grid-template-columns:repeat(3,1fr)}.chip-grid.c4{grid-template-columns:repeat(4,1fr)}
.chip{padding:10px 8px;border:0.5px solid var(--border);border-radius:var(--rm);cursor:pointer;text-align:center;transition:all .15s;background:var(--white)}
.chip:hover{border-color:#94BFDE;background:var(--blue-ll)}.chip.on{border-color:var(--blue);background:var(--blue-ll)}
.chip-icon{font-size:20px;margin-bottom:4px}.chip-name{font-size:12px;font-weight:500;color:var(--text)}.chip-sub{font-size:10px;color:var(--text-2);margin-top:2px}

/* ── Stepper ── */
.stepper{display:flex;align-items:center;border:0.5px solid #CBD5E1;border-radius:var(--rm);overflow:hidden;background:var(--white)}
.stepper-btn{width:36px;height:40px;border:none;background:var(--bg);cursor:pointer;font-size:18px;color:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .1s;user-select:none}
.stepper-btn:hover{background:var(--blue-l)}
.stepper-val{flex:1;text-align:center;font-size:15px;font-weight:600;color:var(--text);border:none;outline:none;background:transparent;min-width:32px;padding:0;-moz-appearance:textfield;width:48px}

/* ── Inv karty ── */
.inv{display:flex;align-items:center;gap:12px;padding:14px 16px;border:0.5px solid var(--border);border-radius:var(--rm);cursor:pointer;transition:all .15s;background:var(--white);margin-bottom:8px}
.inv:hover{border-color:#94BFDE}.inv.on{border-color:var(--blue);background:var(--blue-ll)}
.inv-icon{font-size:26px;flex-shrink:0}.inv-body{flex:1}.inv-title{font-size:13px;font-weight:600;color:var(--text)}.inv-desc{font-size:11px;color:var(--text-2);margin-top:2px}
.inv-chk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
.inv.on .inv-chk{background:var(--blue);border-color:var(--blue);color:#fff}

/* ── Slider ── */
.hh-wrap{margin:8px 0 14px}.hh-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.hh-label{font-size:11px;color:var(--text-2)}.hh-center{font-size:13px;font-weight:600;color:var(--rose)}
input[type=range]{width:100%;accent-color:var(--blue);margin-bottom:12px;cursor:pointer}

/* ── Grafy ── */
.chart-wrap{position:relative;height:130px;margin-bottom:4px}.chart-wrap canvas{width:100%!important;height:130px;display:block}
.chart-hours{display:flex;justify-content:space-between;font-size:10px;color:#94A3B8;margin-top:3px}
.cf-wrap{height:200px}.cf-wrap canvas{width:100%!important;height:200px;display:block}
.prod-wrap{height:180px}.prod-wrap canvas{width:100%!important;height:180px;display:block}

/* ── KPI ── */
.kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.kpi{background:var(--blue-ll);border-radius:var(--rm);padding:14px 16px;border:0.5px solid #C8DFF2;min-width:0}
.kpi-l{font-size:11px;color:#4A7BA8;margin-bottom:4px}.kpi-v{font-size:24px;font-weight:600;color:var(--navy);line-height:1}.kpi-u{font-size:11px;color:#4A7BA8;margin-top:3px;line-height:1.3}
.kpi.green{background:var(--green-l);border-color:#A3D8B8}
.kpi.green .kpi-l,.kpi.green .kpi-u{color:#2E6B40}.kpi.green .kpi-v{color:#1A5C32}
.kpi.amber{background:var(--amber-l);border-color:#F6D860}
.kpi.amber .kpi-l,.kpi.amber .kpi-u{color:#92400E}.kpi.amber .kpi-v{color:#78350F}

/* ── Var karty (modely sdílení) ── */
.var-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;margin-top:20px}
.var-card{border:0.5px solid var(--border);border-radius:var(--r);padding:20px 12px 16px;text-align:center;position:relative;background:var(--white);transition:box-shadow .2s;min-width:0}
.var-card.best{border:2px solid var(--blue);box-shadow:0 0 0 4px rgba(27,108,168,.08)}
.var-badge{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;font-size:10px;font-weight:700;padding:4px 14px;border-radius:10px;white-space:nowrap;box-shadow:0 2px 6px rgba(27,108,168,.3);letter-spacing:.3px}
.var-name{font-size:11px;color:var(--text-2);margin-bottom:8px;line-height:1.3}
.var-kwp{font-size:22px;font-weight:600;color:var(--navy);line-height:1}
.var-kwp span{font-size:12px;font-weight:400;color:var(--text-2)}
.var-save{font-size:14px;color:var(--green);font-weight:600;margin-top:6px}
.var-roi{font-size:11px;color:var(--text-2);margin-top:3px}

/* ── Výsledky tabulka ── */
.res-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px}
.res-table th{text-align:left;font-size:11px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;border-bottom:1.5px solid var(--border);background:var(--bg)}
.res-table td{padding:9px 12px;border-bottom:0.5px solid var(--border);color:var(--text)}
.res-table tr:last-child td{border-bottom:none}
.res-table td:last-child{font-weight:600;color:var(--navy);text-align:right}
.res-table .total td{background:var(--blue-ll);font-weight:700}
.res-table .total td:last-child{color:var(--green);font-size:15px}

/* ── NZÚ box ── */
.nzu-box{background:linear-gradient(135deg,#E3F4E9 0%,#F0FAF4 100%);border:1px solid #A3D8B8;border-radius:var(--r);padding:18px 20px;margin-bottom:12px}
.nzu-title{font-size:14px;font-weight:600;color:#1A5C32;margin-bottom:8px}
.nzu-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;font-size:13px;color:#2E6B40}

/* ── Verdikt ── */
.verdikt{border-radius:var(--r);padding:16px 20px;margin-bottom:12px;font-size:14px;line-height:1.6}
.verdikt.ok{background:var(--green-l);border:1px solid #A3D8B8;color:#1A5C32}
.verdikt.warn{background:var(--amber-l);border:1px solid #F6D860;color:#7C5300}
.verdikt.err{background:#FEE2E2;border:1px solid #FCA5A5;color:#991B1B}

/* ── Badge ── */
.badge{display:inline-flex;align-items:center;border-radius:20px;padding:2px 10px;font-size:10px;font-weight:600;white-space:nowrap}
.b-amber{background:var(--amber-l);color:#92400E}.b-blue{background:var(--blue-l);color:#0C4A7C}.b-green{background:var(--green-l);color:#1A5C32}.b-pro{background:linear-gradient(135deg,#F59E0B,#D97706);color:#fff}

/* ── Tip box ── */
.tip{font-size:12px;color:#4A7BA8;padding:10px 14px;background:var(--blue-ll);border-radius:var(--rm);border-left:3px solid var(--blue);margin-top:12px;line-height:1.5}

/* ── PVGIS loading ── */
.pvgis-loading{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--blue-ll);border-radius:var(--rm);border:0.5px solid #C8DFF2;margin-bottom:12px;font-size:13px;color:#4A7BA8}
.pvgis-spinner{width:20px;height:20px;border:2.5px solid #C8DFF2;border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Limit výpočtů ── */
.limit-bar{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rm);padding:10px 14px;display:flex;align-items:center;gap:12px;margin-bottom:12px;font-size:12px;color:var(--text-2)}
.limit-dots{display:flex;gap:4px}
.limit-dot{width:10px;height:10px;border-radius:50%;background:var(--border)}
.limit-dot.used{background:var(--blue)}
.limit-dot.warn{background:var(--amber)}
.limit-dot.full{background:var(--rose)}

/* ── PDF tlačítko ── */
.btn-pdf{background:linear-gradient(135deg,#1E3A5F,#1B6CA8);color:#fff;border:none;border-radius:var(--rm);padding:11px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px;transition:opacity .15s,transform .1s;white-space:nowrap}
.btn-pdf:hover{opacity:.9;transform:translateY(-1px)}
.btn-pdf:disabled{opacity:.5;cursor:default;transform:none}

/* ── Nav ── */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.step-lbl{font-size:12px;color:#94A3B8}
.btn-prim{background:var(--blue);color:#fff;border:none;border-radius:var(--rm);padding:11px 24px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s;white-space:nowrap}
.btn-prim:hover{opacity:.9;transform:translateY(-1px)}
.btn-out{background:transparent;border:1.5px solid var(--blue);color:var(--blue);border-radius:var(--rm);padding:10px 20px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-out:hover{background:var(--blue-l)}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}

/* ── Cashflow tabulka ── */
.cf-table-wrap{overflow-x:auto;margin-bottom:14px}
.cf-table{width:100%;border-collapse:collapse;font-size:12px;min-width:600px}
.cf-table th{padding:7px 10px;text-align:right;font-size:10px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.4px;border-bottom:1.5px solid var(--border);white-space:nowrap}
.cf-table th:first-child{text-align:left}
.cf-table td{padding:7px 10px;text-align:right;border-bottom:0.5px solid var(--border);color:var(--text)}
.cf-table td:first-child{text-align:left;font-weight:600;color:var(--navy)}
.cf-table tr:nth-child(5n){background:var(--blue-ll)}
.cf-table .positive{color:var(--green);font-weight:600}
.cf-table .negative{color:var(--rose)}
.cf-table .nav-rok td{background:var(--green-l);font-weight:700}

/* ── Expert mód sekce ── */
.expert-section{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rm);padding:14px 16px;margin-bottom:10px}
.expert-section-title{font-size:12px;font-weight:600;color:var(--navy);margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* ── Scénáře ── */
.scenar-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.scenar-card{border:0.5px solid var(--border);border-radius:var(--rm);padding:14px;text-align:center;background:var(--white)}
.scenar-title{font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:8px}
.scenar-v{font-size:18px;font-weight:700;color:var(--navy)}
.scenar-sub{font-size:11px;color:var(--text-2);margin-top:3px}

/* ── Odhlašovací overlay ── */
.auth-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.85);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.auth-overlay.open{display:flex}
.auth-box{background:var(--white);border-radius:16px;padding:36px;max-width:420px;width:90%;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.25)}
.auth-icon{font-size:48px;margin-bottom:16px}
.auth-title{font-family:'DM Serif Display',serif;font-size:24px;color:var(--navy);margin-bottom:8px}
.auth-desc{font-size:13px;color:var(--text-2);margin-bottom:24px;line-height:1.6}

/* ── Responsive ── */
@media(max-width:700px){.g3{grid-template-columns:1fr 1fr}.var-grid{grid-template-columns:1fr}.kpi-row{grid-template-columns:1fr 1fr}.scenar-grid{grid-template-columns:1fr}.hdr-steps{display:none}.chip-grid.c4{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.g2{grid-template-columns:1fr}.kpi-row{grid-template-columns:1fr}.nav{flex-wrap:wrap;gap:8px}}

/* ── CTA box ── */
.cta-box{background:var(--navy);border-radius:var(--r);padding:20px 22px;display:flex;align-items:center;gap:16px;margin-bottom:12px}
.cta-body{flex:1}.cta-title{font-size:15px;font-weight:600;color:#fff;margin-bottom:5px}.cta-desc{font-size:12px;color:#8BA8C4;line-height:1.4}
.btn-cta{background:linear-gradient(135deg,var(--green),#1f6b36);color:#fff;border:none;border-radius:var(--rm);padding:13px 22px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
</style>
</head>
<body>

<!-- AUTH OVERLAY — zobrazí se pokud není přihlášen -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <div class="auth-icon">🔒</div>
    <div class="auth-title">Tato stránka je pouze pro registrované uživatele</div>
    <div class="auth-desc">Pro přístup k PRO kalkulačce se prosím přihlaste nebo registrujte. Registrace je zdarma a nezávazná.</div>
    <button class="btn-prim" style="width:100%;padding:14px;font-size:14px" onclick="window.location.href='kalkulator.html#registrace'">Přihlásit se / Registrovat →</button>
  </div>
</div>

<div class="page">
<header class="hdr">

function getToken(){ return localStorage.getItem('supa_access_token'); }

async function supaFetch(path, method='GET', body=null){
  const token = getToken() || SUPA_KEY;
  const headers = {
    'apikey': SUPA_KEY,
    'Content-Type': 'application/json',
    'Authorization': 'Bearer ' + token,
  };
  if(path.startsWith('/rest/') && method !== 'GET') headers['Prefer'] = 'return=minimal';
  const r = await fetch(SUPA_URL + path, {method, headers, body: body ? JSON.stringify(body) : undefined});
  const text = await r.text();
  return { ok: r.ok, data: text ? JSON.parse(text) : {}, status: r.status };
}

async function getUser(){
  const token = getToken();
  if(!token) return null;
  try{
    const r = await fetch(SUPA_URL + '/auth/v1/user', {
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+token}
    });
    if(!r.ok) return null;
    return await r.json();
  }catch(e){ return null; }
}

// ================================================================

// ================================================================
function stepper(key, label, min, max, step=1){
  const v = D[key] || 0;
  const lbl = label ? `<label>${label}</label>` : '';
  return `${lbl}<div class="stepper"><button class="stepper-btn" onclick="stepChange('${key}',-${step},${min},${max})">−</button><input class="stepper-val" id="sv_${key}" type="number" value="${v}" min="${min}" max="${max}" oninput="stepDirect('${key}',${min},${max})"><button class="stepper-btn" onclick="stepChange('${key}',${step},${min},${max})">+</button></div>`;
}

function stepDirect(key,mn,mx){
  const el=document.getElementById('sv_'+key);
  if(!el)return;
  const val=parseFloat(el.value);
  D[key]=Math.min(mx,Math.max(mn,isNaN(val)?mn:val));
  el.value=D[key];
  recalcDefaults();
}

function stepChange(key,delta,min,max){
  D[key]=Math.min(max,Math.max(min,(+D[key]||0)+delta));
  const el=document.getElementById('sv_'+key);
  if(el&&delta!==0) el.value=D[key];
  recalcDefaults();
}

// Přepočítat výchozí hodnoty po změně počtu bytů atd.
function recalcDefaults(){
  const sp = spSpVypocet();
  const el_sp = document.getElementById('sv_sp_sp_mwh');
  if(el_sp && !el_sp.dataset.manual){ el_sp.value = sp.sp_mwh.toFixed(1); D.sp_sp_mwh = sp.sp_mwh; }
  const kwp = optimKwp();
  D.kwp = kwp;
  const el_kwp = document.getElementById('sv_kwp');
  if(el_kwp && !el_kwp.dataset.manual) el_kwp.value = kwp;
  const inv = Math.round(kwp * cenaKwp(kwp));
  D.cena_invest = inv;
  const el_inv = document.getElementById('sv_cena_invest');
  if(el_inv && !el_inv.dataset.manual) el_inv.value = inv;
}

// ================================================================
// VÝPOČETNÍ POMOCNÉ FUNKCE
// ================================================================
function spSpVypocet(){
  const pb=parseInt(D.bytu)||0, pp=parseInt(D.pater)||0;
  const pv=D.vytahu>0?parseInt(D.vytahu)||0:0;
  const pc=parseInt(D.cerpadla)||0;
  const sp_osv=pp*200+pb*2+100;
  const sp_vytah=pv>0?3000*pv*(1+pp/20.0):0;
  const sp_cerp=pc>0?536*pc*(1+pp/30.0):0;
  const sp_vt=sp_osv+sp_vytah+sp_cerp;
  const sp_tuv=D.tuv?800*pb:0;
  const sp_tc=D.tc?3000*pb:0;
  const sp_ev=parseInt(D.ev)*1500;
  const sp_nt=sp_tuv+sp_tc+sp_ev;
  let sazba_sp='D02d';
  if(D.tc) sazba_sp='D57d';
  else if(D.tuv||D.ev>0) sazba_sp='D25d';
  return {sp_vt_mwh:sp_vt/1000, sp_nt_mwh:sp_nt/1000, sp_mwh:(sp_vt+sp_nt)/1000, sazba_sp};
}

function optimKwp(){
  let base=(parseFloat(D.bytu)||0)*0.55;
  if(D.tc) base*=1.35;
  if(D.zarizeni.includes('akum')) base*=1.25;
  if(parseInt(D.ev)>0) base*=1.15;
  const sp=spSpVypocet();
  if(sp.sp_mwh>0) base+=sp.sp_mwh*0.05;
  return Math.round(base*2)/2;
}

function cenaKwp(kwp){
  if(kwp<=5) return 40000;
  if(kwp<=10) return 36000;
  if(kwp<=20) return 33000;
  if(kwp<=50) return 30000;
  return 27000;
}

function doporucenaSazbu(){
  const z=D.zarizeni;
  if(z.includes('bojler')||z.includes('akum')) return 'D25d';
  if(z.includes('tc')) return 'D57d';
  if(z.includes('ev')) return 'D27d';
  if(z.includes('sporak')) return 'D02d';
  return 'D02d';
}

function getHhLabel(v){ return v<25?'Převážně pracující':v>75?'Převážně senioři / HO':v<50?'Spíše pracující':v>50?'Spíše senioři':'Vyvážený mix'; }

function togZar(k){
  if(k==='zaklad')return;
  if(D.zarizeni.includes(k)) D.zarizeni=D.zarizeni.filter(z=>z!==k);
  else D.zarizeni.push(k);
  if(!D.zarizeni.includes('zaklad')) D.zarizeni.unshift('zaklad');
  // Přepočítat výchozí spotřebu
  let vt=0,nt=0;
  D.zarizeni.forEach(k=>{if(SP_ZAR[k]){vt+=SP_ZAR[k].vt;nt+=SP_ZAR[k].nt;}});
  D.sp_by_vt_mwh = Math.round(vt/100)/10;
  D.sp_by_nt_mwh = Math.round(nt/100)/10;
  D.sazba_byt = doporucenaSazbu();
  render();
}

// ================================================================
// VOLÁNÍ FastAPI /simulate
// ================================================================
async function spustVypocet(){
  const sp = spSpVypocet();
  const kwp = D.kwp || optimKwp();
  const inv = D.cena_invest || Math.round(kwp * cenaKwp(kwp));

  const payload = {
    lat:    D.lat || 49.75,
    lon:    D.lon || 15.5,
    kwp:    kwp,
    sklon:  parseInt(D.sklon) || 35,
    azimut: parseInt(D.azimut) || 0,
    bat:    parseFloat(D.bat) || 0,
    pocet_bytu:    parseInt(D.bytu),
    sp_by_vt_mwh:  parseFloat(D.sp_by_vt_mwh) || 1.2,
    sp_by_nt_mwh:  parseFloat(D.sp_by_nt_mwh) || 0,
    sp_sp_mwh:     parseFloat(D.sp_sp_mwh) || sp.sp_mwh,
    sazba:         D.sazba_byt || doporucenaSazbu(),
    dist:          D.dist,
    profil:        'mix',
    pct_pracujici: parseFloat(D.pct_pracujici) || 33,
    pct_seniori:   parseFloat(D.pct_seniori) || 33,
    pct_rodiny:    parseFloat(D.pct_rodiny) || 34,
    model:         D.model || 'edc',
    edc_ztrata:    parseFloat(D.edc_ztrata) || 15,
    cena_invest:   inv,
    vlastni_pct:   parseFloat(D.vlastni_pct) || 30,
    splatnost:     parseInt(D.splatnost) || 15,
    rust_cen:      parseFloat(D.rust_cen) || 3.0,
    deg_pan:       parseFloat(D.deg_pan) || 0.5,
    cena_pretoky:  parseFloat(D.cena_pretoky) || 1.5,
    bonus_nzu:     parseFloat(D.bonus_nzu) || 0,
    uspora_jistic: 0,
  };

  try{
    const r = await fetch(API_URL + '/simulate', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload),
      signal: AbortSignal.timeout(60000),
    });
    if(!r.ok){
      const err = await r.json().catch(()=>({}));
      throw new Error(err.detail || 'HTTP ' + r.status);
    }
    const data = await r.json();
    RES = { ...data, kwp, inv, bytu: D.bytu, lokace: D.lokace, dist: D.dist, sazba: payload.sazba };

    // Uložit parametry do localStorage pro příští návštěvu
    ulozParamyDoLS();

    // Uložit do Supabase
    await ulozSimulaci(RES, payload);
    await updateLimitBar();

    // Vykreslit výsledky
    document.getElementById('pvgisStatus').innerHTML = `<div style="font-size:12px;color:var(--green);padding:4px 0">✅ Výpočet dokončen — přesná 15minutová simulace · PVGIS TMY data</div>`;
    document.getElementById('resBody').innerHTML = renderResults(RES);
    document.getElementById('btnPdf').disabled = false;
    setTimeout(()=>{ drawCf(); drawProd(); }, 100);

  }catch(e){
    console.error('Chyba výpočtu:', e);
    document.getElementById('pvgisStatus').innerHTML = `<div style="font-size:12px;color:var(--rose);padding:4px 0">❌ Chyba výpočtu: ${e.message}</div>`;
    document.getElementById('resBody').innerHTML = `
      <div class="card" style="text-align:center;padding:24px">
        <div style="font-size:32px;margin-bottom:12px">⚠️</div>

// ================================================================
// ULOŽENÍ SIMULACE DO SUPABASE
// ================================================================
async function ulozSimulaci(res, payload){
  if(!USER) return;

  // Vypočítat klíčové výsledky
  const sim = res.sim || {};
  const cf  = res.cf  || [];
  const cvt = (res.cvt||6610) / 1000;
  const cnt = (res.cnt||4070) / 1000;
  const cpr = (D.cena_pretoky||1.5) / 1000;
  const uspora_rok = cf[0]?.uspora_celkem ||
    Math.round((sim.vlastni_vt_kwh||0)*cvt + (sim.vlastni_nt_kwh||0)*cnt + (sim.pretoky_kwh||0)*cpr);
  const nav = cf.findIndex(r=>r.kumulativni>=0)+1 || null;
  const kum25 = cf[24]?.kumulativni || 0;
  const vyroba_mwh = Math.round((sim.vyroba_kwh||0)/100)/10;
  const nazev = `${D.lokace||'Bez adresy'} · ${D.bytu} bytů · ${res.kwp} kWp`;

  const vysledky = {
    uspora_rok, nav, kum25,
    investice: res.inv,
    vyroba_mwh,
    kwp: res.kwp,
    vlastni_kwh: Math.round(sim.vlastni_kwh||0),
    pretoky_kwh: Math.round(sim.pretoky_kwh||0),
    mira_vs: Math.round((sim.mira_vs||0)*100),
    mira_sob: Math.round((sim.mira_sob||0)*100),
  };

  try{
    // 1. Uložit do simulations (max 5, smazat nejstarší)
    const vsechny = await fetch(
      `${SUPA_URL}/rest/v1/simulations?user_id=eq.${USER.id}&order=created_at.asc&select=id`,
      {headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+getToken()}}
    );
    const arr = await vsechny.json();
    if(Array.isArray(arr) && arr.length >= 5){
      await fetch(`${SUPA_URL}/rest/v1/simulations?id=eq.${arr[0].id}`,{
        method:'DELETE',
        headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+getToken(),'Prefer':'return=minimal'}
      });
    }
    await supaFetch('/rest/v1/simulations','POST',{
      user_id: USER.id,
      name: nazev,
      params: JSON.stringify(payload),
      result: JSON.stringify(vysledky),
    });
  }catch(e){ console.warn('Chyba uložení simulace:', e); }

  try{
    // 2. Uložit/aktualizovat výsledky v leads (hledat lead dle emailu uživatele)
    // Nejdřív zkusit najít existující lead
    const existLead = await fetch(
      `${SUPA_URL}/rest/v1/leads?email=eq.${encodeURIComponent(USER.email)}&select=id&limit=1`,
      {headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+getToken()}}
    );
    const leads = await existLead.json();

    const leadData = {
      // Vstupní parametry
      kwp: res.kwp,
      bytu: parseInt(D.bytu)||null,
      pater: parseInt(D.pater)||null,
      dist: D.dist||null,
      lat: D.lat||null,
      lon: D.lon||null,
      tc: D.tc===true,
      ev: parseInt(D.ev)||0,
      stav: 'nový',
      // Výsledky výpočtu v params
      params: JSON.stringify({
        // Vstup
        lokace: D.lokace||null,
        bytu: D.bytu, vchodu: D.vchodu, pater: D.pater,
        dist: D.dist, sazba: payload.sazba,
        kwp: res.kwp, sklon: D.sklon, azimut: D.azimut,
        model: D.model, bat: D.bat,
        sp_by_vt_mwh: payload.sp_by_vt_mwh,
        sp_by_nt_mwh: payload.sp_by_nt_mwh,
        sp_sp_mwh: payload.sp_sp_mwh,
        cena_invest: res.inv,
        splatnost: D.splatnost,
        rust_cen: D.rust_cen,
        // Výsledky
        uspora_rok,
        uspora_byt_mes: Math.round(uspora_rok/(D.bytu||1)/12),
        nav,
        kum25,
        vyroba_mwh,
        vlastni_kwh: Math.round(sim.vlastni_kwh||0),
        mira_vs: Math.round((sim.mira_vs||0)*100),
        mira_sob: Math.round((sim.mira_sob||0)*100),
        zdroj: 'kalkulator-pro',
        vypocet_cas: new Date().toISOString(),
      }),
    };

    if(Array.isArray(leads) && leads.length > 0){
      // Aktualizovat existující lead
      await fetch(`${SUPA_URL}/rest/v1/leads?id=eq.${leads[0].id}`,{
        method:'PATCH',
        headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+getToken(),'Content-Type':'application/json','Prefer':'return=minimal'},
        body: JSON.stringify(leadData),
      });
    } else {
      // Vytvořit nový lead
      const name = USER.user_metadata?.full_name || USER.email?.split('@')[0] || '—';
      await supaFetch('/rest/v1/leads','POST',{
        ...leadData,
        jmeno: name,
        email: USER.email,
        telefon: USER.user_metadata?.phone||null,
        svj: USER.user_metadata?.svj||null,
        pozice: USER.user_metadata?.pozice||null,
      });
    }
    console.log('Výsledky uloženy do leads:', nazev);
  }catch(e){ console.warn('Chyba uložení do leads:', e); }
}

function drawProfile(){
  const c = document.getElementById('profCanvas');
  if(!c) return;
  const dpr=window.devicePixelRatio||1, W=c.offsetWidth, H=130;
  c.width=W*dpr; c.height=H*dpr; c.style.width=W+'px'; c.style.height=H+'px';
  const ctx=c.getContext('2d'); ctx.scale(dpr,dpr); ctx.clearRect(0,0,W,H);
  const sl=D.hhSlider/100, sp=1-sl;
  const raw=Array(24).fill(0).map((_,h)=>sp*UPRAVY.pracujici[h]+sl*UPRAVY.seniori[h]);
  const mx=Math.max(...raw);
  const pad={l:6,r:6,t:12,b:8}, iW=W-pad.l-pad.r, iH=H-pad.t-pad.b;
  const scX=i=>pad.l+i/23*iW, scY=v=>pad.t+iH-(v/mx)*iH;
  const pts=raw.map((v,i)=>({x:scX(i),y:scY(v)}));
  function sm(ctx,pts){ctx.moveTo(pts[0].x,pts[0].y);for(let i=0;i<pts.length-1;i++){const p0=pts[Math.max(i-1,0)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(i+2,pts.length-1)];ctx.bezierCurveTo(p1.x+(p2.x-p0.x)/6,p1.y+(p2.y-p0.y)/6,p2.x-(p3.x-p1.x)/6,p2.y-(p3.y-p1.y)/6,p2.x,p2.y);}}
  const grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  grad.addColorStop(0,'rgba(244,63,94,0.22)'); grad.addColorStop(1,'rgba(244,63,94,0.02)');
  ctx.fillStyle=grad; ctx.beginPath(); sm(ctx,pts);
  ctx.lineTo(pts[pts.length-1].x,H-pad.b); ctx.lineTo(pts[0].x,H-pad.b); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#F43F5E'; ctx.lineWidth=2.5; ctx.beginPath(); sm(ctx,pts); ctx.stroke();
}

function drawCf(){
  if(!RES || !RES.cf) return;
  const c = document.getElementById('cfCanvas');
  if(!c) return;
  const cf = RES.cf;
  const dpr=window.devicePixelRatio||1, W=c.offsetWidth, H=200;
  c.width=W*dpr; c.height=H*dpr; c.style.width=W+'px'; c.style.height=H+'px';
  const ctx=c.getContext('2d'); ctx.scale(dpr,dpr); ctx.clearRect(0,0,W,H);
  const vals=cf.map(r=>r.kumulativni);
  const mn=Math.min(...vals,0), mx=Math.max(...vals,1), range=mx-mn;
  const pad={l:60,r:16,t:14,b:28}, iW=W-pad.l-pad.r, iH=H-pad.t-pad.b;
  const scX=i=>pad.l+i/(cf.length-1)*iW, scY=v=>pad.t+iH-(v-mn)/range*iH;
  ctx.font=`10px DM Sans,system-ui,sans-serif`; ctx.textAlign='right'; ctx.fillStyle='#94A3B8';
  for(let s=0;s<=4;s++){
    const v=mn+range/4*s, y=scY(v);
    ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillText(Math.round(v/1000)+'k',pad.l-4,y+3.5);
  }
  ctx.textAlign='center'; ctx.fillStyle='#94A3B8';
  [5,10,15,20,25].forEach(rok=>{
    const x=scX(rok-1);
    ctx.strokeStyle='rgba(0,0,0,0.04)'; ctx.beginPath(); ctx.moveTo(x,pad.t); ctx.lineTo(x,H-pad.b); ctx.stroke();
    ctx.fillText(rok,x,H-pad.b+10);
  });
  if(mn<0&&mx>0){ctx.strokeStyle='rgba(30,58,95,0.2)';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);ctx.beginPath();ctx.moveTo(pad.l,scY(0));ctx.lineTo(W-pad.r,scY(0));ctx.stroke();ctx.setLineDash([]);}
  const gradF=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  gradF.addColorStop(0,'rgba(46,139,74,0.2)'); gradF.addColorStop(1,'rgba(46,139,74,0.02)');
  ctx.fillStyle=gradF; ctx.beginPath(); ctx.moveTo(scX(0),scY(Math.max(vals[0],0)));
  vals.forEach((v,i)=>ctx.lineTo(scX(i),scY(v)));
  ctx.lineTo(scX(vals.length-1),scY(0)); ctx.lineTo(scX(0),scY(Math.max(vals[0],0))); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#2E8B4A'; ctx.lineWidth=2.5; ctx.lineJoin='round';
  ctx.beginPath(); vals.forEach((v,i)=>i===0?ctx.moveTo(scX(i),scY(v)):ctx.lineTo(scX(i),scY(v))); ctx.stroke();
  const navIdx=vals.findIndex(v=>v>=0);
  if(navIdx>0){
    const nx=scX(navIdx), ny=scY(0);
    ctx.fillStyle='rgba(46,139,74,0.15)'; ctx.beginPath(); ctx.arc(nx,ny,10,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#2E8B4A'; ctx.beginPath(); ctx.arc(nx,ny,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(nx,ny,2.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#1A5C32'; ctx.font=`bold 11px DM Sans,system-ui,sans-serif`; ctx.textAlign='center';
    ctx.fillText(`✓ rok ${navIdx+1}`,nx,ny-14);
  }
}

function drawProd(){
  if(!RES || !RES.sim) return;
  const c = document.getElementById('prodCanvas');
  if(!c) return;
  const sim = RES.sim;
  const mes  = sim.mesice_nazvy   || ['L','Ú','B','D','K','Č','Č','S','Z','Ř','L','P'];
  const vyr  = sim.mesice_vyroba  || Array(12).fill(0);
  const vl   = sim.mesice_vlastni || Array(12).fill(0);
  const pr   = sim.mesice_pretoky || Array(12).fill(0);
  const dpr=window.devicePixelRatio||1, W=c.offsetWidth, H=180;
  c.width=W*dpr; c.height=H*dpr; c.style.width=W+'px'; c.style.height=H+'px';
  const ctx=c.getContext('2d'); ctx.scale(dpr,dpr); ctx.clearRect(0,0,W,H);
  const pad={l:46,r:10,t:14,b:28}, iW=W-pad.l-pad.r, iH=H-pad.t-pad.b;
  const mx=Math.max(...vyr,1);
  const bw=iW/12*0.7, bs=iW/12;
  ctx.font=`10px DM Sans,system-ui,sans-serif`;
  for(let s=0;s<=4;s++){
    const v=mx/4*s, y=pad.t+iH-v/mx*iH;
    ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='#94A3B8'; ctx.textAlign='right';
    ctx.fillText(Math.round(v)+'',pad.l-4,y+3.5);
  }
  vyr.forEach((v,i)=>{
    const x=pad.l+i*bs+(bs-bw)/2;
    const h=v/mx*iH, y=pad.t+iH-h;
    // Přetoky (zelená)
    const pct=(v>0?pr[i]/v:0), vlpct=(v>0?vl[i]/v:0);
    ctx.fillStyle='rgba(46,139,74,0.7)'; ctx.fillRect(x,y,bw,h*pct);
    // Vlastní (modrá)
    ctx.fillStyle='rgba(27,108,168,0.8)'; ctx.fillRect(x,y+h*pct,bw,h*vlpct);
    // Zbytek (amber — výroba celkem)
    ctx.fillStyle='rgba(245,158,11,0.3)'; ctx.fillRect(x,y+h*(pct+vlpct),bw,h*(1-pct-vlpct));
    ctx.fillStyle='#94A3B8'; ctx.textAlign='center';
    ctx.fillText(mes[i],x+bw/2,H-pad.b+11);
  });
}

let _acTimer = null;
async function onLokInput(){
  const el = document.getElementById('fLok');
  if(!el) return;
  const v = el.value.trim();
  D.lokace = v; D.lat = null; D.lon = null;
  clearTimeout(_acTimer);
  if(v.length < 3){ const l=document.getElementById('acList'); if(l)l.classList.remove('open'); return; }
  _acTimer = setTimeout(async()=>{
    try{
      const r = await fetch(`${API_URL}/geocode/search?q=${encodeURIComponent(v)}`);
      const data = await r.json();
      const list = document.getElementById('acList');
      if(!list) return;
      if(!data.length){ list.classList.remove('open'); return; }
      list.innerHTML = data.map(d=>`<div class="ac-item" onclick="pickLok(${d.lat},${d.lon},'${(d.display_name||'').replace(/'/g,"\\'")}')">📍 ${d.display_name||''}</div>`).join('');
      list.classList.add('open');
    }catch(e){}
  }, 400);
}

function pickLok(lat, lon, name){
  D.lat = parseFloat(lat); D.lon = parseFloat(lon);
  D.lokace = name.split(',').slice(0,3).join(', ');
  const el = document.getElementById('fLok');
  if(el) el.value = D.lokace;
  const list = document.getElementById('acList');
  if(list) list.classList.remove('open');
  // Automatický distributor dle lokace
  const nl = name.toLowerCase();
  if(nl.includes('prag')||nl.includes('praha')) D.dist='PREdistribuce';
  else if(nl.includes('brno')||nl.includes('jihomorav')||nl.includes('pardubice')) D.dist="EG.D (E.ON)";
  else D.dist='ČEZ Distribuce';
}

  const cpr  = (D.cena_pretoky||1.5)/1000;
  const uspora1 = cf[0]?.uspora_celkem||Math.round((sim.vlastni_vt_kwh||0)*cvt+(sim.vlastni_nt_kwh||0)*cnt+(sim.pretoky_kwh||0)*cpr);

  const vyroba = Math.round((sim.vyroba_kwh||0)/100)/10;
  const uver = Math.min(inv*0.8,5000000);
  const splatnost = D.splatnost||15;

  const cfRows = cf.map((r,i)=>{
    const isNav = nav && r.rok===nav;
    const bg = isNav?'#DCF5E7':i%2===0?'#F8FAFB':'#fff';
    return `<tr style="background:${bg};font-weight:${isNav?700:400}">

// LOCALSTORAGE — pamatovat parametry uživatele
// ================================================================
const LS_KEY = 'svj_pro_params';

function ulozParamyDoLS(){
  try{
    const save = {
      lokace:D.lokace, lat:D.lat, lon:D.lon,
      bytu:D.bytu, vchodu:D.vchodu, pater:D.pater,
      vytahu:D.vytahu, cerpadla:D.cerpadla,
      tuv:D.tuv, zatepleno:D.zatepleno, okna:D.okna, topeni:D.topeni,
      tc:D.tc, ev:D.ev, zarizeni:D.zarizeni, hhSlider:D.hhSlider,
      dist:D.dist, sazba_byt:D.sazba_byt, sazba_sp:D.sazba_sp,
      sp_by_vt_mwh:D.sp_by_vt_mwh, sp_by_nt_mwh:D.sp_by_nt_mwh, sp_sp_mwh:D.sp_sp_mwh,
      kwp:D.kwp, sklon:D.sklon, azimut:D.azimut, strTyp:D.strTyp, bat:D.bat,
      model:D.model, edc_ztrata:D.edc_ztrata,
      cena_invest:D.cena_invest, vlastni_pct:D.vlastni_pct,
      splatnost:D.splatnost, rust_cen:D.rust_cen, deg_pan:D.deg_pan,
      cena_pretoky:D.cena_pretoky, bonus_nzu:D.bonus_nzu,
    };
    localStorage.setItem(LS_KEY, JSON.stringify(save));
  }catch(e){}
}

function nacistParamyZLS(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return;
    const p = JSON.parse(raw);
    Object.keys(p).forEach(k=>{ if(p[k]!==null && p[k]!==undefined) D[k]=p[k]; });
  }catch(e){}
}

// Automatická baterie dle kWp (1.4× výkon, zaokrouhleno na 5 kWh)
function autoBaterie(kwp){
  return Math.round(kwp * 1.4 / 5) * 5;
}

// Načíst uloženou simulaci z moje-vypocty
async function nacistUlozenouSimulaci(){
  const simId = sessionStorage.getItem('load_sim_id');
  if(!simId || !USER) return false;
  sessionStorage.removeItem('load_sim_id');
  try{
    const r = await fetch(
      `${SUPA_URL}/rest/v1/simulations?id=eq.${simId}&user_id=eq.${USER.id}&select=*`,
      {headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+getToken()}}
    );
    const arr = await r.json();
    if(!Array.isArray(arr)||!arr.length) return false;
    const sim = arr[0];
    const p = JSON.parse(sim.params||'{}');
    if(p.pocet_bytu||p.bytu) D.bytu = p.pocet_bytu||p.bytu;
    if(p.lokace) D.lokace=p.lokace;
    if(p.lat) D.lat=p.lat;
    if(p.lon) D.lon=p.lon;
    if(p.dist) D.dist=p.dist;
    if(p.sazba) D.sazba_byt=p.sazba;
    if(p.kwp) D.kwp=p.kwp;
    if(p.bat!==undefined) D.bat=p.bat;
    if(p.sklon) D.sklon=p.sklon;
    if(p.azimut!==undefined) D.azimut=p.azimut;
    if(p.model) D.model=p.model;
    if(p.cena_invest) D.cena_invest=p.cena_invest;
    if(p.splatnost) D.splatnost=p.splatnost;
    if(p.rust_cen) D.rust_cen=p.rust_cen;
    if(p.sp_by_vt_mwh) D.sp_by_vt_mwh=p.sp_by_vt_mwh;
    if(p.sp_by_nt_mwh!==undefined) D.sp_by_nt_mwh=p.sp_by_nt_mwh;
    if(p.sp_sp_mwh) D.sp_sp_mwh=p.sp_sp_mwh;
    // Načíst výsledky do RES a přejít na krok 6 — BEZ nového výpočtu
    const result = JSON.parse(sim.result||'{}');
    if(result.uspora_rok){
      // Máme výsledky — zobrazíme je přímo
      RES = {
        sim: { vlastni_kwh: result.vlastni_kwh||0, vlastni_vt_kwh: result.vlastni_kwh||0,
               vlastni_nt_kwh: 0, pretoky_kwh: result.pretoky_kwh||0,
               vyroba_kwh: (result.vyroba_mwh||0)*1000,
               mira_vs: (result.mira_vs||0)/100, mira_sob: (result.mira_sob||0)/100,
               mesice_vyroba:[], mesice_spotreba:[], mesice_vlastni:[], mesice_pretoky:[],
               mesice_nazvy:['Led','Úno','Bře','Dub','Kvě','Čvn','Čvc','Srp','Zář','Říj','Lis','Pro'] },
        cf: [], cvt: 6610, cnt: 4070,
        kwp: p.kwp||D.kwp, inv: result.investice||D.cena_invest,
        bytu: D.bytu, lokace: D.lokace, dist: D.dist, sazba: p.sazba||D.sazba_byt,
      };
      sessionStorage.setItem('show_sim_result', JSON.stringify(result));
    }
    cur = 5;
    return true;
  }catch(e){ console.warn('Chyba načtení simulace:', e); return false; }
}

// Předvyplnit adresu z profilu uživatele
function nacistAdresuZProfilu(){
  if(!USER) return;
  const meta = USER.user_metadata || {};
  if(meta.adresa_domu && !D.lokace) D.lokace = meta.adresa_domu;
}

(async ()=>{
  const ok = await initAuth();
  if(!ok) return;
  // 1. Načíst uložené parametry z localStorage
  nacistParamyZLS();
  // 2. Předvyplnit adresu z profilu pokud LS nemá adresu
  nacistAdresuZProfilu();
  // 3. Automatická baterie pokud není
  if(!D.bat || D.bat === 0){
    const kwp = D.kwp || optimKwp();
    D.bat = autoBaterie(kwp);
  }
  // 4. Zkusit načíst uloženou simulaci (z moje-vypocty)
  const loadedSim = await nacistUlozenouSimulaci();
  render();
  // 5. Pokud se načetla simulace BEZ výsledků, spustit výpočet
  if(loadedSim){
    const savedResult = sessionStorage.getItem('show_sim_result');
    sessionStorage.removeItem('show_sim_result');
    if(savedResult){
      // Zobrazit uložené výsledky bez nového výpočtu
      const result = JSON.parse(savedResult);
      setTimeout(()=>{ renderUlozeneVysledky(result); }, 300);
    } else {
      setTimeout(spustVypocet, 300);
    }
  }
})();
</script>
